<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Internal Server Error | Shubham Kulkarni</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="An internal server error occurred. Please try again later or return to Shubham Kulkarni's portfolio.">
    <link rel="canonical" href="https://kulkarnishub377.github.io/sk/">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .error-page::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(255, 86, 86, 0.08), transparent 60%),
                        radial-gradient(ellipse at 80% 70%, rgba(255, 125, 125, 0.06), transparent 50%);
            pointer-events: none;
        }
        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff4d4d, #ff6b6b, var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }
        
        .error-code::after {
            content: "500";
            position: absolute;
            left: 0;
            top: 0;
            color: transparent;
            background: linear-gradient(135deg, #ff4d4d, #ff6b6b, var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.05em, -0.0125em);
            opacity: 0.8;
        }

        .error-code::before {
            content: "500";
            position: absolute;
            left: 0;
            top: 0;
            color: transparent;
            background: linear-gradient(135deg, #ff4d4d, #ff6b6b, var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            transform: translate(0.05em, 0.025em);
            opacity: 0.8;
        }

        @keyframes glitch-anim {
            0% { clip-path: polygon(0 2%, 100% 2%, 100% 5%, 0 5%); }
            20% { clip-path: polygon(0 15%, 100% 15%, 100% 15%, 0 15%); }
            40% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
            60% { clip-path: polygon(0 1%, 100% 1%, 100% 2%, 0 2%); }
            80% { clip-path: polygon(0 33%, 100% 33%, 100% 33%, 0 33%); }
            100% { clip-path: polygon(0 44%, 100% 44%, 100% 44%, 0 44%); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: polygon(0 25%, 100% 25%, 100% 30%, 0 30%); }
            20% { clip-path: polygon(0 3%, 100% 3%, 100% 3%, 0 3%); }
            40% { clip-path: polygon(0 5%, 100% 5%, 100% 20%, 0 20%); }
            60% { clip-path: polygon(0 15%, 100% 15%, 100% 20%, 0 20%); }
            80% { clip-path: polygon(0 10%, 100% 10%, 100% 10%, 0 10%); }
            100% { clip-path: polygon(0 30%, 100% 30%, 100% 30%, 0 30%); }
        }

        .error-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .error-description {
            font-size: 1.1rem;
            color: var(--text-soft);
            max-width: 500px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .error-links a:hover {
            color: #ff6b6b;
        }
        .server-icon {
            font-size: 4rem;
            color: #ff4d4d;
            margin-bottom: 1.5rem;
            animation: pulse-red 2s infinite;
            filter: drop-shadow(0 0 15px rgba(255, 77, 77, 0.4));
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; filter: drop-shadow(0 0 25px rgba(255, 77, 77, 0.6)); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <main class="error-page">
        <div>
            <div class="server-icon">
                <i class="fas fa-server"></i>
            </div>
            <div class="error-code" aria-hidden="true" data-text="500">500</div>
            <h1 class="error-title">Internal Server Error</h1>
            <p class="error-description">
                Oops! Something went wrong on our end. We're experiencing some technical difficulties right now. 
                Please try again later.
            </p>
            <div class="error-actions">
                <button onclick="window.location.reload();" class="btn btn-secondary-outline">
                    <i class="fas fa-redo-alt me-2"></i>Refresh Page
                </button>
                <a href="./" class="btn btn-gradient" style="background: linear-gradient(135deg, #ff4d4d, #ff6b6b); border: none;">
                    <i class="fas fa-home me-2"></i>Back to Home
                </a>
            </div>
            <div class="error-links">
                <a href="./#contact"><i class="fas fa-envelope me-1"></i> Report Issue</a>
                <a href="javascript:history.back()"><i class="fas fa-arrow-left me-1"></i> Go Back</a>
            </div>
        </div>
    </main>
</body>
</html>
