<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Shubham Kulkarni</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="The page you're looking for doesn't exist. Return to Shubham Kulkarni's portfolio.">
    <link rel="canonical" href="https://kulkarnishub377.github.io/sk/">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .error-page::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(86, 182, 255, 0.08), transparent 60%),
                        radial-gradient(ellipse at 80% 70%, rgba(142, 125, 255, 0.06), transparent 50%);
            pointer-events: none;
        }
        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-violet), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
            animation: glitch 3s ease-in-out infinite;
        }
        .error-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .error-description {
            font-size: 1.1rem;
            color: var(--text-soft);
            max-width: 500px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .error-links a:hover {
            color: var(--accent);
        }
        @keyframes glitch {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
    </style>
</head>
<body>
    <main class="error-page">
        <div>
            <div class="error-code" aria-hidden="true">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                The page you're looking for doesn't exist or has been moved. 
                Let's get you back on track.
            </p>
            <div class="error-actions">
                <a href="./" class="btn btn-gradient">
                    <i class="fas fa-home me-2"></i>Back to Portfolio
                </a>
                <a href="./blog/" class="btn btn-secondary-outline">
                    <i class="fas fa-blog me-2"></i>Read Blog
                </a>
                <a href="./#projects" class="btn btn-secondary-outline">
                    <i class="fas fa-code me-2"></i>View Projects
                </a>
            </div>
            <div class="error-links">
                <a href="./#about"><i class="fas fa-user me-1"></i> About</a>
                <a href="./#experience"><i class="fas fa-briefcase me-1"></i> Experience</a>
                <a href="./#skills"><i class="fas fa-cogs me-1"></i> Skills</a>
                <a href="./#contact"><i class="fas fa-envelope me-1"></i> Contact</a>
            </div>
        </div>
    </main>
</body>
</html>
